<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Gula</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Brand */
  --br:#FA0050;--brd:#D4003F;--brl:#FFF0F4;--brll:#FFF7F9;--brb:#FFAFC7;
  /* Neutrals */
  --bg:#F7F7F8;--cd:#FFFFFF;
  --bd:#EBEBED;--bd2:#F2F2F4;
  --t1:#111114;--t2:#6B6B78;--t3:#AFAFB8;
  /* Semantic */
  --gn:#16A34A;--gnb:#F0FDF4;--gnr:#BBF7D0;
  --am:#B45309;--amb:#FFFBEB;--amr:#FDE68A;
  --rd:#DC2626;--rdb:#FFF1F2;--rdr:#FECACA;
  /* Elevation */
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  /* Radii */
  --r1:10px;--r2:14px;--r3:20px;
}

/* ─── BASE ─── */
html,body{height:100%;background:#09090B;font-family:'DM Sans',system-ui,sans-serif;display:flex;justify-content:center;align-items:stretch}
#app{width:100%;max-width:430px;height:100%;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
@media(min-width:700px){#app{box-shadow:0 0 0 1px rgba(0,0,0,.08),0 20px 60px rgba(0,0,0,.3);border-radius:36px;margin:24px auto;height:calc(100vh - 48px);align-self:flex-start}}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:max(104px,calc(88px + env(safe-area-inset-bottom,16px)));scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .18s cubic-bezier(.25,.46,.45,.94) forwards}

/* ─── STATUS BAR ─── */


/* ─── HEADER ─── */
.hd{padding:14px 20px 12px;background:var(--cd);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.bb{display:flex;align-items:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--t2);font-size:13px;padding:0;margin-bottom:8px;font-family:DM Sans,sans-serif;font-weight:500}
.bb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ht{font-size:20px;font-weight:700;color:var(--t1);line-height:1.2;letter-spacing:-.3px}
.hs{font-size:13px;color:var(--t2);margin-top:2px;font-weight:400}
.hd-logo{font-size:22px;font-weight:800;color:var(--br);letter-spacing:-.5px;font-family:DM Sans,sans-serif}

/* ─── NAV (bottom pill) ─── */
.nav{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:transparent;
  padding:10px 20px;
  padding-bottom:max(16px,env(safe-area-inset-bottom,16px));
  z-index:100;
  pointer-events:none;
}
.nav-pill{pointer-events:auto;}
.nav-pill{
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:32px;
  display:grid;grid-template-columns:1fr 1fr 68px 1fr 1fr;
  padding:6px 4px;
  box-shadow:0 2px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.95);
}
/* Center action button inside nav pill */
.nb-plus{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 4px;border:none;background:none;cursor:pointer;position:relative;}
.nb-plus-inner{width:48px;height:48px;border-radius:50%;background:var(--br);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(250,0,80,.4);transition:transform .15s,box-shadow .15s;}
.nb-plus-inner svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.nb-plus:active .nb-plus-inner{transform:scale(.88);box-shadow:0 2px 8px rgba(250,0,80,.3);}
/* Quick action bottom sheet */
.qa-sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;transition:opacity .2s;}
.qa-sheet-overlay.vis{opacity:1;}
.qa-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--cd);border-radius:24px 24px 0 0;padding:0 16px;z-index:201;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1,.46,1);padding-bottom:max(24px,env(safe-area-inset-bottom,24px));}
.qa-sheet.vis{transform:translateY(0);}
.qa-sheet-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 20px;}
.qa-sheet-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;}
.qa-sheet-btn{display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--cd);cursor:pointer;font-family:DM Sans,sans-serif;text-align:left;margin-bottom:8px;box-shadow:var(--sh);transition:border-color .15s;}
.qa-sheet-btn:active{border-color:var(--br);background:var(--brll);}
.qa-sheet-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qa-sheet-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.qa-sheet-label{font-size:14px;font-weight:600;color:var(--t1);}
.qa-sheet-sub{font-size:12px;color:var(--t3);margin-top:1px;}
@keyframes nb-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav-pill{animation:nb-in .22s ease-out forwards}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:10px;font-weight:500;font-family:DM Sans,sans-serif;position:relative;transition:color .2s;min-width:0;width:100%}
.nb .ic{width:40px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:16px;transition:background .2s,transform .15s}
.nb .ic svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;transition:stroke-width .2s}
.nb.on{color:var(--br)}
.nb.on .ic{background:var(--brl)}
.nb.on .ic svg{stroke-width:2.25}
.nb:active .ic{transform:scale(.88)}
.nb-dot{position:absolute;top:1px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--br);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.95)}
.np{position:absolute;top:1px;right:8px;width:16px;height:16px;border-radius:50%;background:var(--br);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ─── FAB ─── */
.fab{position:absolute;bottom:90px;right:20px;background:var(--br);color:#fff;border:none;border-radius:28px;padding:13px 22px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(250,0,80,.35);z-index:80;font-family:DM Sans,sans-serif;display:flex;align-items:center;gap:7px;transition:transform .15s,box-shadow .15s,background .15s}
.fab:active{transform:scale(.96);box-shadow:0 2px 10px rgba(250,0,80,.3);background:var(--brd)}
.fab svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ─── SCREEN PAD ─── */
.p{padding:16px 20px}

/* ─── KPI GRID ─── */
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ki{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 14px;box-shadow:var(--sh)}
.ki-full{grid-column:1/-1}
.kl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kv{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.5px;line-height:1}
.ks{font-size:12px;color:var(--t3);margin-top:5px}

/* ─── HOME HERO ─── */
.hero-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r3);padding:22px 20px 18px;margin-bottom:12px;box-shadow:var(--sh2);position:relative;overflow:hidden;}
.hero-period{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:4px;cursor:pointer;width:fit-content;}
.hero-period svg{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.hero-value{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:6px;font-family:DM Sans,sans-serif;}
.hero-sub{font-size:13px;color:var(--t2);display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.hero-sub span{display:flex;align-items:center;gap:4px;}
.hero-delta{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.hero-delta.pos{background:var(--gnb);color:var(--gn);}
.hero-delta.neg{background:var(--rdb);color:var(--rd);}
.hero-delta.neu{background:var(--bd2);color:var(--t2);}
/* Cobros card */
.cobros-card{display:flex;align-items:center;gap:14px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:12px;box-shadow:var(--sh);cursor:pointer;transition:border-color .15s;}
.cobros-card:active{border-color:var(--br);background:var(--brll);}
.cobros-dot{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cobros-dot svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.cobros-body{flex:1;min-width:0;}
.cobros-val{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:2px;}
.cobros-lbl{font-size:12px;color:var(--t2);}
.cobros-arr{width:20px;height:20px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
/* ─── ACCESOS RÁPIDOS ─── */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.qa-btn{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 12px;cursor:pointer;text-align:left;font-family:DM Sans,sans-serif;transition:border-color .15s,box-shadow .15s;box-shadow:var(--sh)}
.qa-btn:active{border-color:var(--br);box-shadow:0 0 0 3px var(--brl)}
.qa-icon{width:36px;height:36px;border-radius:10px;background:var(--brl);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.qa-icon svg{width:18px;height:18px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.qa-label{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3}

/* ─── ALERTS ─── */
.al{display:flex;gap:10px;padding:12px 14px;border-radius:var(--r1);font-size:13px;line-height:1.5;margin-bottom:10px;align-items:flex-start}
.al svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.aw{background:var(--amb);color:var(--am);border:1px solid var(--amr)}
.as{background:var(--gnb);color:var(--gn);border:1px solid var(--gnr)}
.ai{background:var(--brl);color:var(--br);border:1px solid var(--brb)}

/* ─── BADGES ─── */
.bg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bgg{background:var(--gnb);color:var(--gn);border:1px solid var(--gnr)}
.bga{background:var(--amb);color:var(--am);border:1px solid var(--amr)}
.bgb{background:var(--brl);color:var(--br);border:1px solid var(--brb)}
.bgx{background:var(--bd2);color:var(--t2);border:1px solid var(--bd)}

/* ─── LIST ITEMS ─── */
.li{display:flex;align-items:center;gap:12px;padding:14px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;box-shadow:var(--sh)}
.li.cl{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.li.cl:hover{border-color:rgba(200,24,79,.25);box-shadow:0 2px 10px rgba(200,24,79,.08)}
.li.cl:active{border-color:var(--br);transform:scale(.995)}
.la{width:42px;height:42px;border-radius:11px;background:var(--brl);color:var(--br);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.lb{flex:1;min-width:0}
.ln{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lm{font-size:12px;color:var(--t2);margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.lr{text-align:right;flex-shrink:0}

/* ─── SECTION TITLE ─── */
.sc{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 10px}

/* ─── SEARCH ─── */
.sb2{display:flex;align-items:center;gap:9px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r1);padding:10px 14px;margin-bottom:12px;box-shadow:var(--sh)}
.sb2 svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb2 input{flex:1;border:none;outline:none;font-size:14px;color:var(--t1);background:none;font-family:DM Sans,sans-serif}
.sb2 input::placeholder{color:var(--t3)}

/* ─── CHIPS ─── */
.ch{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.ch::-webkit-scrollbar{display:none}
.cp{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid var(--bd);background:var(--cd);color:var(--t2);font-family:DM Sans,sans-serif;flex-shrink:0;transition:all .15s}
.cp.on{background:var(--br);color:#fff;border-color:var(--br);font-weight:600}
.cp.on.cp-ok{background:var(--gn);border-color:var(--gn)}

/* ─── BUTTONS ─── */
.btn{width:100%;padding:14px 16px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;border:none;transition:opacity .15s,background .15s,transform .1s}
.btn:hover{opacity:.92}.btn:active{opacity:.85;transform:scale(.98)}
.bp{background:var(--br);color:#fff}
.bp:active{background:var(--brd)}
.bs2{background:transparent;color:var(--t1);border:1px solid var(--bd) !important}
.btn:disabled{opacity:.3;cursor:not-allowed}
.cp:hover:not(.on){background:var(--bg2,var(--bg));border-color:rgba(200,24,79,.3);color:var(--br)}

/* ─── FORM ─── */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px;letter-spacing:.1px}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--r1);font-size:14px;color:var(--t1);background:var(--cd);outline:none;font-family:DM Sans,sans-serif;transition:border-color .15s}
.fi:focus{border-color:var(--br)}
.fs{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--r1);font-size:14px;color:var(--t1);background:var(--cd);outline:none;appearance:none;cursor:pointer;font-family:DM Sans,sans-serif;transition:border-color .15s}
.fs:focus{border-color:var(--br)}

/* ─── STEPS ─── */
.st{display:flex;align-items:center;gap:5px;margin-bottom:20px}
.sd{height:5px;border-radius:3px;background:var(--bd);transition:all .2s}
.sd.on{background:var(--br)}

/* ─── TABS ─── */
.tb{background:var(--cd);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:-16px;z-index:40;margin:0 -20px 10px;padding:0 20px}
.tb::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--t2);border-bottom:2.5px solid transparent;white-space:nowrap;font-family:DM Sans,sans-serif;transition:color .15s}
.tab.on{color:var(--br);border-bottom-color:var(--br);font-weight:700}

/* ─── BOX ─── */
.bx{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:15px;margin-bottom:10px;box-shadow:var(--sh)}
.rp{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:7px}

/* ─── SUMMARY ─── */
.sr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--t1)}
.st2{display:flex;justify-content:space-between;padding:12px 0 4px;font-size:16px;font-weight:700;color:var(--t1)}
.sm{display:flex;justify-content:space-between;padding:4px 0 10px;font-size:13px;color:var(--gn)}

/* ─── CART BAR ─── */
.cbar{background:var(--br);color:#fff;padding:15px 20px;margin:14px -20px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:sticky;bottom:90px;z-index:60;box-shadow:0 -2px 16px rgba(250,0,80,.2)}
.cbar:active{background:var(--brd)}
.cbar-l{font-size:13px;opacity:.9}
.cbar-r{font-size:14px;font-weight:700}

/* ─── EMPTY STATE ─── */
.emp{text-align:center;padding:48px 24px}
.emp-i{font-size:56px;margin-bottom:16px;line-height:1}
.emp-t{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:8px}
.emp-s{font-size:14px;color:var(--t2);margin-bottom:26px;line-height:1.6}

/* ─── RECIPE ROW ─── */
.rr{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd)}
.rr-n{flex:1;min-width:0}
.rr-nm{font-size:13px;font-weight:600;color:var(--t1)}
.rr-s{font-size:11px;color:var(--t2);margin-top:2px}
.rr-qi{width:72px;padding:7px 8px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;text-align:center;font-family:DM Sans,sans-serif;outline:none;color:var(--t1)}
.rr-qi:focus{border-color:var(--br)}
.rr-d{cursor:pointer;color:var(--rd);font-size:18px;padding:4px;flex-shrink:0;line-height:1}

/* ─── INSIGHT/WARNING ─── */
.wc{background:var(--rdb);border:1px solid var(--rdr);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.wc-t{font-size:13px;font-weight:700;color:var(--rd);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.wc-b{font-size:12px;color:var(--rd);line-height:1.6}
.ac2{background:var(--amb);border:1px solid var(--amr);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.ac2-t{font-size:13px;font-weight:700;color:var(--am);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.ac2-b{font-size:12px;color:var(--am);line-height:1.6}

/* ─── BAR CHART ─── */
.bar-row{padding:9px 0;border-bottom:1px solid var(--bd2)}
.bar-fill{height:5px;border-radius:3px;background:var(--br);margin-top:5px}

/* ─── PRODUCT ORDER CARD ─── */
.pc{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bd)}
.qb{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bd);background:var(--cd);cursor:pointer;font-size:18px;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:all .15s}
.qb.add{background:var(--br);color:#fff;border-color:var(--br)}

/* ─── RADIO ─── */
.rg{display:flex;gap:8px;margin-top:6px}
.ro{display:flex;align-items:center;gap:7px;padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--r1);cursor:pointer;font-size:14px;color:var(--t2);background:var(--cd);flex:1;justify-content:center;transition:all .15s}
.ro.on{border-color:var(--br);color:var(--br);background:var(--brl);font-weight:600}

/* ─── OK ICON ─── */

function latMp(id){var s=D.mpp.filter(function(p){return p.m===id;}).sort(function(a,b){return b.f.localeCompare(a.f);});return s[0]?s[0].v:0;}

function costoMp(ptId){return D.rec.filter(function(r){return r.pt===ptId&&r.t==='MP';}).reduce(function(s,i){return s+latMp(i.i)*i.q;},0);}

// ─── Historial de precios de venta del producto ───
function ptpReg(ptId,v,f){
  if(!v||v<=0)return;
  D.ptp=D.ptp||[];
  var last=D.ptp.filter(function(p){return p.pt===ptId;}).sort(function(a,b){return b.f.localeCompare(a.f);})[0];
  if(last&&last.v===v)return; // no registrar si no cambió
  D.ptp.push({id:uid(),pt:ptId,v:v,f:f||toStr()});
}
// ─── Costo histórico del producto en una fecha dada ───
function costoHistAt(ptId,fecha){
  var items=D.rec.filter(function(r){return r.pt===ptId;});
  return items.reduce(function(s,it){
    var histArr=it.t==='MP'
      ?D.mpp.filter(function(p){return p.m===it.i&&p.f<=fecha;}).sort(function(a,b){return b.f.localeCompare(a.f);})
      :D.mep.filter(function(p){return p.m===it.i&&p.f<=fecha;}).sort(function(a,b){return b.f.localeCompare(a.f);});
    var pr=histArr[0]?histArr[0].v:0;
    return s+pr*it.q;
  },0);
}
// ─── Precio de venta histórico en una fecha dada ───
function ptPrecioAt(ptId,fecha){
  var hist=D.ptp.filter(function(p){return p.pt===ptId&&p.f<=fecha;}).sort(function(a,b){return b.f.localeCompare(a.f);});
  if(hist[0])return hist[0].v;
  var pt=D.pt.find(function(p){return p.id===ptId;});
  return pt?pt.v:0;
}

function calcEvolMensual(ptId,meses){
  meses=meses||6;
  var today=new Date();
  var rows=[];
  for(var i=meses-1;i>=0;i--){
    var d=new Date(today.getFullYear(),today.getMonth()-i,1);
    var y=d.getFullYear(),mo=d.getMonth()+1;
    var lbl=(mo<10?'0'+mo:mo)+'/'+String(y).slice(2);
    var fechaFin=y+'-'+(mo<10?'0'+mo:mo)+'-28';
    var co=costoHistAt(ptId,fechaFin);
    var yields=((D.pt.find(function(p){return p.id===ptId;})||{}).yields)||1;
    var cpu=yields>1?co/yields:co;
    var pv=ptPrecioAt(ptId,fechaFin);
    var mg=pv>0?Math.round((pv-cpu)/pv*100):null;
    rows.push({lbl:lbl,co:Math.round(cpu),pv:Math.round(pv),mg:mg});
  }
  return rows;
}
// ─── Indicador de estado de margen ───
function mgEstado(ptId){
  var rows=calcEvolMensual(ptId,4);
  var conDatos=rows.filter(function(r){return r.mg!==null&&r.pv>0&&r.co>0;});
  if(!conDatos.length)return null;
  var last=conDatos[conDatos.length-1];
  var mg=last.mg;
  // tendencia: comparar último vs primero con datos
  var first=conDatos[0];
  var trend=conDatos.length>1?last.mg-first.mg:0;
  if(mg<0||mg<35)return{color:'var(--rd)',bg:'var(--rdb)',label:'🔴 Revisar precio de venta',trend:trend,mg:mg};
  if(mg<50||trend<-5)return{color:'var(--am)',bg:'var(--amb)',label:'🟡 Margen deteriorándose',trend:trend,mg:mg};
  return{color:'var(--gn)',bg:'var(--gnb)',label:'🟢 Margen saludable',trend:trend,mg:mg};
}
function pedTot(id){var p=D.ped.find(function(x){return x.id===id;});return D.pi.filter(function(i){return i.d===id;}).reduce(function(s,i){return s+i.v*i.q;},0)+(p?p.pe:0);}
function pedCob(id){return D.cob.filter(function(c){return c.d===id;}).reduce(function(s,c){return s+c.v;},0);}
function pedGan(id){var p=D.ped.find(function(x){return x.id===id;});var its=D.pi.filter(function(i){return i.d===id;});var ing=its.reduce(function(s,i){return s+i.v*i.q;},0)+(p?p.pe:0);var cos=its.reduce(function(s,i){return s+costo(i.pt)*i.q;},0)+(p?p.ce:0);return ing-cos;}
function pedEst(id){var t=pedTot(id),c=pedCob(id);return c<=0?'sin':c>=t?'cob':'par';}
function perSt(per){var ps=D.ped.filter(function(p){return p.f.indexOf(per)===0;});var v=ps.reduce(function(s,p){return s+pedTot(p.id);},0);var g=ps.reduce(function(s,p){return s+pedGan(p.id);},0);var gi=D.gi.filter(function(x){return x.p===per;}).reduce(function(s,x){return s+x.v;},0);return{v:v,g:g,gi:gi,n:ps.length,mg:pct(g,v)};}

  h+='<button onclick="NO=freshNO();go(\'newOrder\')" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--br);color:#fff;border:none;border-radius:var(--r2);padding:16px;font-size:15px;font-weight:700;font-family:DM Sans,sans-serif;cursor:pointer;margin-bottom:8px;box-shadow:0 4px 16px rgba(250,0,80,.28);transition:opacity .15s;" onmousedown="this.style.opacity=\'.85\'" onmouseup="this.style.opacity=\'1\'" ontouchstart="this.style.opacity=\'.85\'" ontouchend="this.style.opacity=\'1\'">'
    +'<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">'+SVG_ORD+'</svg>Nuevo pedido</button>';

function renderGastoDet(){
  var cat=D.cgi.find(function(c){return c.id===SP.id;});
  if(!cat){go('gastos');return;}
  var isSueldos=cat.id==='sueldos'||(cat.n&&cat.n.toLowerCase().indexOf('sueldo')>=0);
  var hist=D.gi.filter(function(g){return g.c===cat.id;}).sort(function(a,b){return b.p.localeCompare(a.p);});
  setH(cat.e+' '+cat.n,'Histórico de gastos','gastos','Gastos fijos','');
  var h='<div class="p">';
  // Chart-like history
  if(hist.length>1){
    var maxV=Math.max.apply(null,hist.map(function(g){return g.v;}));
    h+='<div class="sc">Evolución (últimos '+Math.min(hist.length,6)+' meses)</div>';
    h+='<div class="bx" style="padding:14px">';
    var shown=hist.slice(0,6).reverse();
    for(var i=0;i<shown.length;i++){
      var g=shown[i],pct2=maxV?Math.round(g.v/maxV*100):0;
      var prev=shown[i-1];var dl2=prev?pct(g.v-prev.v,prev.v):0;

      h+='<span>'+perLbl(g.p)+'</span><span style="font-weight:600;color:var(--t1)">'+fmt(g.v)+(dl2?'  <span style="color:'+(dl2>0?'var(--rd)':'var(--gn)')+'">('+(dl2>0?'↑':'↓')+Math.abs(dl2)+'%)</span>':'')+'</span>';
      h+='</div>';
      h+='<div style="height:6px;background:var(--bd);border-radius:3px"><div style="height:6px;background:var(--br);border-radius:3px;width:'+pct2+'%"></div></div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Per-period list
  h+='<div class="sc">Detalle por período</div>';
  if(!hist.length){h+=alrt('i','Sin registros para este concepto.');}

  for(var i=0;i<hist.length;i++){

    h+='<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--t1)">'+fmt(g.v)+'</div>';

    h+='<button onclick="delGastoRow(\''+gid+'\')" style="border:none;background:none;cursor:pointer;font-size:16px;padding:2px 4px;color:var(--rd)">🗑</button>';

function renderNO(){
  var o=NO,st=o.step;
  var sub=o.items.reduce(function(s,i){return s+i.v*i.q;},0);
  var tot=sub+(o.pe||0);
  var cosT=o.items.reduce(function(s,i){return s+costo(i.pt)*i.q;},0)+(o.ce||0);
  var gan=tot-cosT,mg=pct(gan,tot),sub2=(o.ce||0)>(o.pe||0)?o.ce-o.pe:0;
  var cl=D.cli.find(function(c){return c.id===o.cliId;});
  var back=st>1?'NO.step--;renderNO()':'go(\'pedidos\')';
  var backLbl=st>1?'Atrás':'Pedidos';

function genRemito(pedId){
  var ped=D.ped.find(function(p){return p.id===pedId;});
  if(!ped){alert('Pedido no encontrado');return;}
  var cl=D.cli.find(function(c){return c.id===ped.cl;})||{n:'—',dir:'',tel:'',cuit:'',loc:'',cp:'',mail:''};
  var items=D.pi.filter(function(i){return i.d===pedId;});
  var tot=items.reduce(function(s,i){return s+i.v*i.q;},0)+(ped.pe||0);

  // Try jsPDF, fall back to print window
  var jsPDF=(window.jspdf&&window.jspdf.jsPDF)||(window.jsPDF)||null;
  if(jsPDF){
    try{
      var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      var W=210,M=18,cW=W-M*2;
      doc.setFillColor(200,24,79);doc.rect(0,0,W,28,'F');
      doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(20);
      doc.text('REMITO',M,17);
      doc.setFontSize(10);doc.setFont('helvetica','normal');
      doc.text('GULA',W-M,17,{align:'right'});
      doc.setTextColor(60,60,60);doc.setFontSize(9);
      doc.text('Fecha: '+fmtD(ped.f),M,36);
      doc.text('Nº: '+pedId.slice(-6).toUpperCase(),W-M,36,{align:'right'});
      doc.setDrawColor(220,220,220);doc.setFillColor(249,249,249);
      doc.roundedRect(M,40,cW,22,2,2,'FD');
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(140,140,140);
      doc.text('CLIENTE',M+4,47);
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(30,30,30);
      doc.text(cl.n,M+4,54);
      if(cl.dir){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);doc.text(cl.dir,M+4,60);}
      var ty=70;
      doc.setFillColor(245,245,245);doc.rect(M,ty,cW,7,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(80,80,80);
      doc.text('PRODUCTO',M+3,ty+5);doc.text('CANT.',M+cW*0.6,ty+5);
      doc.text('P.UNIT.',M+cW*0.74,ty+5);doc.text('SUBTOTAL',M+cW,ty+5,{align:'right'});
      ty+=7;
      for(var i=0;i<items.length;i++){

function toggleCatSearch(){

      div.id='cat-sr-wrap';div.style.marginBottom='8px';

function hideMpCatNew(){var d=$('mp-cat-new');if(d)d.style.display='none';}
function updMpCat(val){
  var newDiv=$('mp-cat-new');
  if(!newDiv)return;
  if(val==='__new__'){newDiv.style.display='block';}
  else{
    newDiv.style.display='none';
    var mp=D.mp.find(function(m){return m.id===SP.id;});
    if(mp){mp.c=val;saveD();}
  }
}
function saveMpNewCat(){
  var n=($('mp-cat-new-n')&&$('mp-cat-new-n').value||'').trim();
  if(!n){alert('Ingresá un nombre para la categoría');return;}
  var id=uid();
  (D.cmp=D.cmp||[]).push({id:id,n:n,e:'🔹'});
  var mp=D.mp.find(function(m){return m.id===SP.id;});
  if(mp){mp.c=id;saveD();}
  renderMpDet();
}

function saveMpPrice(){
  // Determine active mode
  var modeTotal=$('mpd-mode-total')&&$('mpd-mode-total').style.display!=='none';
  var v;
  if(modeTotal){
    var tot=parseFloat($('mpd-tot')&&$('mpd-tot').value)||0;
    var qty=parseFloat($('mpd-qty')&&$('mpd-qty').value)||0;
    if(!tot||!qty){alert('Ingresá el total gastado y la cantidad comprada');return;}
    v=tot/qty;
  } else {
    v=parseFloat($('mpd-v')&&$('mpd-v').value)||0;
    if(!v||v<=0){alert('Ingresá un precio válido mayor a $0');return;}
  }
  var f=($('mpd-f')&&$('mpd-f').value)||toStr();
  var pv=($('mpd-pv')&&$('mpd-pv').value)||'';
  var oldV=D.mpp.filter(function(p){return p.m===SP.id;}).sort(function(a,b){return b.f.localeCompare(a.f);})[0];
  (D.mpp=D.mpp||[]).push({id:uid(),m:SP.id,v:v,f:f,pv:pv});
  saveD();
  // Warn if price change is significant
  if(oldV){
    var dl=pct(v-oldV.v,oldV.v);
    if(Math.abs(dl)>=5){
      var affected=D.rec.filter(function(r){return r.t==='MP'&&r.i===SP.id;}).map(function(r){return D.pt.find(function(p){return p.id===r.pt;});}).filter(Boolean);
      if(affected.length){
        var msg=(dl>0?'↑ Suba':'↓ Baja')+' del '+Math.abs(dl)+'% impacta en: '+affected.map(function(p){return p.n;}).join(', ')+'. Revisá los márgenes.';
        setTimeout(function(){alert(msg);},100);
      }
    }
  }
  showToast('✅ Precio guardado');
  setTimeout(function(){go('catalogo');},400);
}

function rcSave(){
  if(!NRC.items.length){alert('Agregá al menos un ingrediente a la receta.');return;}
  D.rec=D.rec.filter(function(r){return r.pt!==NRC.ptId;});
  for(var i=0;i<NRC.items.length;i++){
    var it=NRC.items[i];
    D.rec.push({id:uid(),pt:NRC.ptId,t:it.t,i:it.i,q:it.q});
  }
  saveD();
  SS.cTab='recetas';
  go('catalogo');
  setTimeout(function(){showToast('✅ Receta guardada');},80);
}

function renderEvolucionRentabilidad(ptId){
  var rows=calcEvolMensual(ptId,6);
  var conDatos=rows.filter(function(r){return r.pv>0&&r.co>0;});
  if(!conDatos.length){
    return '<div style="padding:14px;text-align:center;color:var(--t3);font-size:13px">Sin datos suficientes. Registrá precios de ingredientes para ver la evolución.</div>';
  }
  var est=mgEstado(ptId);
  var h='';
  // Estado badge
  if(est){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:'+est.bg+';border-radius:var(--r1);margin-bottom:12px">';
    h+='<span style="font-size:14px;font-weight:700;color:'+est.color+';flex:1">'+est.label+'</span>';
    if(Math.abs(est.trend)>=2){
      var trendTxt=est.trend>0?'+'+est.trend+'%':est.trend+'%';
      h+='<span style="font-size:11px;font-weight:600;color:'+est.color+'">Mg '+trendTxt+' vs hace 3 meses</span>';
    }
    h+='</div>';
  }
  // Alerta si margen se deteriora
  if(est&&(est.label.indexOf('🔴')>=0||est.label.indexOf('🟡')>=0)){
    var last=conDatos[conDatos.length-1];
    var alrtMsg=last.mg<35

  h+='</tr></thead><tbody>';
  for(var i=0;i<rows.length;i++){

// ─── Edit Cat Prices state ───
var cpDirty={};  // ptId → new value (only modified)

function cpBuildRows(){
  var h='';
  (D.cpt||[]).slice().sort(function(a,b){return a.n.localeCompare(b.n);}).forEach(function(cat){
    if(window.cpFl&&window.cpFl!=='todos'&&cat.id!==window.cpFl)return;
    var fps=(D.pt||[]).filter(function(p){return p.c===cat.id&&(!window.cpSr||p.n.toLowerCase().indexOf((window.cpSr||'').toLowerCase())>=0);});
    if(!fps.length)return;
    h+="<div class='sc'>"+esc(cat.n)+"</div>";
    fps.forEach(function(pt){
      var co=costo(pt.id);
      var curV=cpDirty[pt.id]!==undefined?cpDirty[pt.id]:pt.v;
      var mg0=pct(curV-co,curV),mgc0=mg0>=50?'var(--gn)':mg0>=35?'var(--am)':'var(--rd)';
      var isDirty=cpDirty[pt.id]!==undefined;
      h+="<div class='bx' style='padding:12px;margin-bottom:8px"+(isDirty?';border-color:rgba(250,0,80,.35)':'')+";'>";
      h+="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'>";
      h+="<div style='font-size:14px;font-weight:500;color:var(--t1)'>"+ptEmoji(pt.c)+" "+esc(pt.n)+"</div>";
      if(isDirty)h+="<span style='font-size:10px;font-weight:700;color:var(--br);background:var(--brl);padding:2px 7px;border-radius:10px;letter-spacing:.3px'>EDITADO</span>";
      h+="</div>";
      h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end'>";
      h+="<div><div class='kl'>COSTO ACTUAL</div><div style='font-size:15px;font-weight:600;color:var(--t1)'>"+fmt(co)+"</div></div>";
      h+="<div><label class='fl'>PRECIO CATÁLOGO</label><input class='fi' type='number' id='cp-"+pt.id+"' value='"+curV+"' oninput='updCpMg(\""+pt.id+"\")' style='padding:8px 10px;font-size:14px;font-weight:600;color:var(--br)'></div>";
      h+="</div>";
      h+="<div style='margin-top:8px;font-size:12px;color:var(--t2)' id='cp-mg-"+pt.id+"'><span style='color:"+mgc0+";font-weight:600'>"+mg0+"%</span> margen</div>";
      h+="</div>";
    });
  });
  return h;
}

function renderEditCatPrices(){
  if(window.cpSr===undefined)window.cpSr='';
  if(window.cpFl===undefined)window.cpFl='todos';
  cpDirty={};
  setH('Precios de catálogo','Actualizá los precios del mes','catalogo','Catálogo','');
  var h="<div class='p'>";
  h+="<div class='sb2'><svg viewBox='0 0 24 24' style='width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg><input id='cp-search-inp' placeholder='Buscar producto...' value='"+esc(window.cpSr||'')+"' oninput='window.cpSr=this.value;updCpSr()'></div>";
  h+="<div class='ch'>";
  h+="<button class='cp"+(window.cpFl==='todos'?' on':'')+"' onclick='window.cpFl=\"todos\";updCpSr()'>Todos</button>";
  (D.cpt||[]).slice().sort(function(a,b){return a.n.localeCompare(b.n);}).forEach(function(c){
    h+="<button class='cp"+(window.cpFl===c.id?' on':'')+"' onclick='window.cpFl=\""+c.id+"\";updCpSr()'>"+esc(c.n)+"</button>";
  });
  h+="</div>";

function updCpSr(){
  var res=$('cp-sr-res');
  if(!res){renderEditCatPrices();return;}
  res.innerHTML=cpBuildRows();
}

function updCpMg(ptId){
  var inp=$('cp-'+ptId),mgEl=$('cp-mg-'+ptId);
  if(!inp||!mgEl)return;
  var v=parseFloat(inp.value)||0,co=costo(ptId);
  var newV=parseFloat(inp.value);
  // Track dirty state
  if(!isNaN(newV)&&newV>0&&newV!==D.pt.find(function(p){return p.id===ptId;}).v){
    cpDirty[ptId]=newV;
  } else {
    delete cpDirty[ptId];
  }
  var mg=pct(v-co,v);
  var mgc=mg>=50?'var(--gn)':mg>=35?'var(--am)':'var(--rd)';
  mgEl.innerHTML='<span style="color:'+mgc+';font-weight:600">'+mg+'%</span> margen';
  // Update card border
  var card=inp.closest?inp.closest('.bx'):null;
  if(card){
    card.style.borderColor=cpDirty[ptId]!==undefined?'rgba(250,0,80,.35)':'';
    var badge=card.querySelector('.cp-edited-badge');
    if(cpDirty[ptId]!==undefined&&!badge){
      var titleRow=card.querySelector('div>div');
      if(titleRow){var sp=document.createElement('span');sp.className='cp-edited-badge';sp.style.cssText='font-size:10px;font-weight:700;color:var(--br);background:var(--brl);padding:2px 7px;border-radius:10px;letter-spacing:.3px';sp.textContent='EDITADO';titleRow.appendChild(sp);}
    } else if(!cpDirty[ptId]&&badge){badge.remove();}
  }
  cpUpdStickyBar();
}

function cpUpdStickyBar(){
  var bar=$('cp-sticky-bar');
  var dirtyCount=Object.keys(cpDirty).length;
  if(!bar){
    // Create sticky bar container anchored inside #app
    var el=document.createElement('div');
    el.id='cp-sticky-bar';
    el.style.cssText='position:absolute;left:0;right:0;bottom:0;z-index:150;padding:10px 16px;padding-bottom:max(16px,env(safe-area-inset-bottom,16px));background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);box-shadow:0 -4px 20px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1,.46,1);';
    el.innerHTML='<div id="cp-bar-label" style="flex:1;font-size:13px;color:var(--t2)"></div>'
      +'<button id="cp-bar-save" onclick="saveCatPrices()" style="background:var(--br);color:#fff;border:none;border-radius:var(--r1);padding:11px 22px;font-size:14px;font-weight:700;font-family:DM Sans,sans-serif;cursor:pointer;white-space:nowrap;box-shadow:0 2px 12px rgba(250,0,80,.3);transition:opacity .15s;">Guardar cambios</button>';
    $('app').appendChild(el);
    bar=$('cp-sticky-bar');
  }
  if(dirtyCount>0){
    $('cp-bar-label').innerHTML='<span style="font-weight:700;color:var(--t1)">'+dirtyCount+'</span> precio'+(dirtyCount>1?'s':'')+'<span style="color:var(--t3)"> modificado'+(dirtyCount>1?'s':'')+'</span>';
    bar.style.transform='translateY(0)';
  } else {
    bar.style.transform='translateY(100%)';
  }
}

function saveCatPrices(){
  // Save only dirty values
  var savedCount=0;
  for(var ptId in cpDirty){
    var pt=D.pt.find(function(p){return p.id===ptId;});
    if(pt&&cpDirty[ptId]>0){ptpReg(ptId,cpDirty[ptId],toStr());pt.v=cpDirty[ptId];savedCount++;}
  }
  saveD();
  cpDirty={};
  // Hide bar with animation
  var bar=$('cp-sticky-bar');
  if(bar)bar.style.transform='translateY(100%)';
  // Rebuild rows in place (preserve scroll + search)
  var res=$('cp-sr-res');
  if(res)res.innerHTML=cpBuildRows();
  // Brief success feedback
  var lbl=$('cp-bar-label');
  if(lbl){lbl.innerHTML='<span style="color:var(--gn);font-weight:600">✓ '+savedCount+' precio'+(savedCount>1?'s':'')+' guardado'+(savedCount>1?'s':'')+'</span>';}
}

function mpCreateModeUnit(){

}
function mpCreateModeTotal(){

function mpCreateUpdUnitLabels(){
  var sel=$('mpu');if(!sel)return;
  var u=sel.value;
  var uFull={kg:'kilogramo',g:'gramo',lt:'litro',ml:'mililitro',u:'unidad',paq:'paquete'};
  var fl=uFull[u]||u;
  var lbl=$('mpc-price-lbl');if(lbl)lbl.textContent='Precio por '+fl+' ($)';
  var ql=$('mpc-qty-lbl');if(ql)ql.textContent='Cantidad ('+u+')';
  mpCreateCalcUnit();
}
function mpCreateCalcUnit(){
  var tot=parseFloat($('mpc-tot')&&$('mpc-tot').value)||0;
  var qty=parseFloat($('mpc-qty')&&$('mpc-qty').value)||0;
  var sel=$('mpu');var u=sel?sel.value:'kg';
  var el=$('mpc-unit-calc');
  if(el)el.textContent=(tot&&qty)?fmt(tot/qty)+'/'+u:'—';
}
function saveNewPvFromMp(){
  var pvN=($('newpvn')&&$('newpvn').value||'').trim();
  if(!pvN){alert('El nombre del proveedor es obligatorio');return;}
  var pvId=uid();
  (D.pvs=D.pvs||[]).push({id:pvId,n:pvN,tel:($('newpvt')&&$('newpvt').value)||'',mail:($('newpvm')&&$('newpvm').value)||''});
  saveD();
  // Update the select to show the new proveedor
  var sel=$('mppv');

    for(var i=0;i<sel.options.length;i++){

function showMpCatNew(){

function saveNewMpCatInline(){
  var n=($('mp-cat-new-n2')&&$('mp-cat-new-n2').value||'').trim();
  if(!n){alert('Ingresá un nombre para la categoría');return;}
  var id=uid();
  (D.cmp=D.cmp||[]).push({id:id,n:n,e:'🔹'});
  saveD();
  // Update the select in createMP
  var sel=$('mpc');
  if(sel){
    var opt=document.createElement('option');
    opt.value=id;opt.text=n;opt.selected=true;
    sel.insertBefore(opt,sel.lastChild);
  }
  hideMpCatNew();
}
function saveMp(){
  var n=($("mpn")&&$("mpn").value||"").trim();
  if(!n){alert("El nombre es obligatorio");return;}
  var catVal=$("mpc")&&$("mpc").value||'';
  if(catVal==="__new__"){
    var newCatN=prompt("Nombre de la nueva categoría:");
    if(!newCatN||!newCatN.trim()){alert("Ingresá un nombre para la categoría");return;}
    var newCatId=uid();
    (D.cmp=D.cmp||[]).push({id:newCatId,n:newCatN.trim(),e:"🔹"});
    catVal=newCatId;
  }
  var pvSel=$("mppv");
  var pvVal=pvSel?pvSel.value:'';
  if(pvVal==="__new__"){
    var pvDiv=$('mp-pv-new');
    if(pvDiv){pvDiv.style.display='block';}
    alert('Completá los datos del nuevo proveedor y hacé clic en "Guardar proveedor".');
    return;
  }
  var uVal=$("mpu")&&$("mpu").value||'kg';
  var id=uid();
  (D.mp=D.mp||[]).push({id:id,n:n,c:catVal,u:uVal,pv:pvVal});
  // Dual pricing mode
  var modeTotal=$('mpc-mode-total')&&$('mpc-mode-total').style.display!=='none';
  var prc=0;
  if(modeTotal){
    var tot=parseFloat($('mpc-tot')&&$('mpc-tot').value)||0;
    var qty=parseFloat($('mpc-qty')&&$('mpc-qty').value)||0;
    if(tot&&qty)prc=tot/qty;
  } else {
    var prcEl=$('mpprc');prc=parseFloat(prcEl&&prcEl.value)||0;
  }
  var fecEl=$('mpfec');var fec=fecEl&&fecEl.value||toStr();
  if(prc>0){(D.mpp=D.mpp||[]).push({id:uid(),m:id,v:prc,f:fec,pv:pvVal});}
  saveD();SS.cTab='mp';go('catalogo');
  setTimeout(function(){showToast('✅ Ingrediente guardado');},80);
}

    if(cl.cp)  h+='<div style="display:flex;gap:10px"><span style="font-size:13px;color:var(--t3);min-width:80px">Cod. Postal</span><span style="font-size:13px;font-weight:600;color:var(--t1)">'+esc(cl.cp)+'</span></div>';

function renderGastos(){
  var per=curPer();
  var allPers=[];
  var now=new Date(),yr=now.getFullYear(),mo=now.getMonth()+1;
  for(var i=0;i<12;i++){var mm=mo-i;var yy=yr;while(mm<=0){mm+=12;yy--;}allPers.push(yy+'-'+(mm<10?'0':'')+mm);}
  var perSel=SS.gasPer||per;
  var gaS=D.gi.filter(function(g){return g.p===perSel;}),totS=gaS.reduce(function(s,g){return s+g.v;},0);
  var prevP=allPers[allPers.indexOf(perSel)+1]||'';
  var totPS=prevP?D.gi.filter(function(g){return g.p===prevP;}).reduce(function(s,g){return s+g.v;},0):0;
  var dlS=totPS?pct(totS-totPS,totPS):0;
  var pending=D.cgi.filter(function(c){var found=gaS.find(function(g){return g.c===c.id;});return !found;});
  var loaded=D.cgi.length-pending.length;
  setH('Gastos fijos',perLbl(perSel),'mas','Más',
    '<div style="text-align:right"><div style="font-size:17px;font-weight:700;color:var(--t1)">'+fmtK(totS)+'</div>'
    +(dlS?'<div style="font-size:11px;color:'+(dlS>0?'var(--rd)':'var(--gn)')+';">'+(dlS>0?'↑':'↓')+Math.abs(dlS)+'%</div>':'')+'</div>');
  var h='<div class="p">';
  // Monthly evolution chart
  h+='<div class="bx" style="padding:14px 10px;margin-bottom:8px;overflow:hidden"><canvas id="ch-gastos" style="max-height:180px"></canvas></div>';
  // Period selector
  h+='<div class="ch">';
  for(var i=0;i<allPers.length;i++){var ap=allPers[i];h+='<button class="cp'+(perSel===ap?' on':'')+'" onclick="SS.gasPer=\''+ap+'\';renderGastos()" style="flex-shrink:0">'+perLbl(ap)+'</button>';}
  h+='</div>';
  // Summary card
  h+='<div class="bx" style="padding:14px;margin-bottom:8px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div><div style="font-size:18px;font-weight:700;color:var(--t1)">'+fmtK(totS)+'</div>';
  h+='<div style="font-size:12px;color:var(--t3);margin-top:2px">'+loaded+'/'+D.cgi.length+' conceptos cargados'+(pending.length?' · <span style="color:var(--am);font-weight:600">'+pending.length+' pendientes</span>':'')+'</div></div>';
  if(pending.length){h+='<div style="font-size:12px;color:var(--am);font-weight:600">⚠ '+pending.length+' sin cargar</div>';}
  h+='</div>';
  // Progress bar
  h+='<div style="height:6px;background:var(--bd);border-radius:3px">';
  h+='<div style="height:6px;background:'+(pending.length?'var(--am)':'var(--gn)')+';border-radius:3px;width:'+Math.round(loaded/Math.max(D.cgi.length,1)*100)+'%"></div>';
  h+='</div></div>';
  if(pending.length){h+=alrt('w','Faltan cargar: <b>'+pending.map(function(c){return c.n;}).join(', ')+'</b>');}
  // Category list
  for(var i=0;i<D.cgi.length;i++){
    var cat=D.cgi[i],gi=gaS.find(function(g){return g.c===cat.id;}),cid=cat.id;
    var giP=prevP?D.gi.find(function(g){return g.c===cat.id&&g.p===prevP;}):null;
    var dlt=gi&&giP?pct(gi.v-giP.v,giP.v):0;
    var isPending=!gi;

function initGastosChart(){
  var c=document.getElementById('ch-gastos');
  if(!c)return;
  if(c._chart)c._chart.destroy();
  var allPers=[];var now=new Date(),yr=now.getFullYear(),mo=now.getMonth()+1;
  for(var i=0;i<12;i++){var mm=mo-i;var yy=yr;while(mm<=0){mm+=12;yy--;}allPers.push(yy+'-'+(mm<10?'0':'')+mm);}
  var repN=SS.gastN||6;
  var pers=allPers.slice(0,repN).reverse();
  var labels=pers.map(function(p){return perLbl(p);});
  var totals=pers.map(function(p){return D.gi.filter(function(g){return g.p===p;}).reduce(function(s,g){return s+g.v;},0);});
  c._chart=new Chart(c,{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Gastos totales',data:totals,backgroundColor:'rgba(200,24,79,.75)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '$'+Math.round(v/1000)+'k';},maxTicksLimit:4}}}}
  });
}

function renderCuentas(){

  h+='</div>';

  h+='<div class="bx" style="padding:12px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">';
  h+='<div><div style="font-size:12px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.4px">'+perLabel+'</div></div>';
  h+='<div style="font-size:20px;font-weight:700;color:var(--gn)">'+fmtK(totAll)+'</div>';

function renderCuentaDet(){

      var cl=ped?D.cli.find(function(cl){return cl.id===ped.cl;}):null;
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:'+(i<moCobs.length-1?'1px solid var(--bd2)':'none')+'">';
      h+='<div>';
      h+='<div style="font-size:13px;font-weight:500;color:var(--t1)">'+( cl?esc(cl.n):'Cobro manual')+'</div>';
      h+='<div style="font-size:12px;color:var(--t3)">'+fmtD(c.f)+'</div>';
      h+='</div>';
      h+='<div style="font-size:15px;font-weight:700;color:var(--gn)">'+fmt(c.v)+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  setC(h);
}

function activeNotifCount(){return buildNotifs().filter(function(n){return !n.dismissed;}).length;}
function buildNotifs(){
  var notifs=[];
  var per=curPer();
  // 1. Cobros pendientes
  var peds=D.ped.filter(function(p){return pedEst(p.id)!=='cob';});
  for(var i=0;i<peds.length;i++){
    var p=peds[i];var cl=D.cli.find(function(c){return c.id===p.cl;});
    var monto=pedTot(p.id)-pedCob(p.id);
    notifs.push({id:'pend-'+p.id,type:'cobro',title:'Cobro pendiente',body:(cl?cl.n:'Cliente')+' · '+fmt(monto),action:"go('pedDet',{id:'"+p.id+"'})",actionLabel:'Ver pedido',color:'var(--br)',icon:'💰'});
  }
  // 2. Gastos fijos incompletos (mes actual)
  var cargadas={};D.gi.filter(function(g){return g.p===per;}).forEach(function(g){cargadas[g.c]=1;});
  var mis=D.cgi.filter(function(c){return !cargadas[c.id];});
  for(var i=0;i<mis.length;i++){
    var cat=mis[i];
    notifs.push({id:'gasto-'+cat.id,type:'gasto',title:'Gasto fijo pendiente',body:cat.n+' · '+perLbl(per)+' sin cargar',action:"go('gastoDet',{id:'"+cat.id+"'})",actionLabel:'Cargar gasto',color:'var(--am)',icon:'🏠'});
  }
  // 3. Productos con margen bajo
  for(var i=0;i<D.pt.length;i++){
    var pt=D.pt[i],co=costo(pt.id),mg=pct(pt.v-co,pt.v);
    if(co>0&&(mg<0||mg<40)){var mgTitle=mg<0?'Margen negativo':'Margen bajo';var mgColor=mg<0?'rgba(239,68,68,1)':'rgba(239,68,68,.8)';notifs.push({id:'mg-'+pt.id,type:'margen',title:mgTitle,body:pt.n+' · '+mg+'% (meta: 40%)',action:"rcInit('"+pt.id+"');go('createReceta')",actionLabel:'Ver producto',color:mgColor,icon:mg<0?'🚨':'⚠️'});}
    // Deterioro de tendencia: si el margen cayó más de 6pp en los últimos 3 meses
    if(co>0){var evol=calcEvolMensual(pt.id,4);var conD=evol.filter(function(r){return r.mg!==null&&r.pv>0&&r.co>0;});if(conD.length>=2){var mgTrend=conD[conD.length-1].mg-conD[0].mg;if(mgTrend<=-6&&mg>=40){var nidT='trend-'+pt.id;var dismissedT=(SS.dismissedNotifs||[]).indexOf(nidT)>=0;notifs.push({id:nidT,type:'margen',title:'Margen en baja',body:pt.n+' · bajó '+Math.abs(mgTrend)+'pp en 3 meses',action:"rcInit('"+pt.id+"');go('createReceta')",actionLabel:'Ver evolución',color:'rgba(180,83,9,.9)',icon:'📉',dismissed:dismissedT});}}}
  }
  // 4. Ingredientes con suba de precio sin traslado
  for(var i=0;i<D.mpp.length;i++){
    var cur=D.mpp[i];var others=D.mpp.filter(function(p){return p.m===cur.m&&p.f<cur.f;}).sort(function(a,b){return b.f.localeCompare(a.f);});
    if(!others.length)continue;var dl=pct(cur.v-others[0].v,others[0].v);
    if(dl>8){var mpObj=D.mp.find(function(m){return m.id===cur.m;});if(mpObj){var nid='cost-'+cur.id;var dismissed=(SS.dismissedNotifs||[]).indexOf(nid)>=0;notifs.push({id:nid,type:'costo',title:'Costo subió +'+dl+'%',body:mpObj.n+' · revisá precios de productos',action:"go('catalogo')",actionLabel:'Ver catálogo',color:'rgba(99,102,241,.8)',icon:'📈',dismissed:dismissed});}}
  }
  // 5. Ingredientes o empaques sin precio
  var mpSinP=D.mp.filter(function(m){return !D.mpp.some(function(p){return p.m===m.id;});});
  var meSinP=D.me.filter(function(m){return !D.mep.some(function(p){return p.m===m.id;});});
  if(mpSinP.length||meSinP.length){
    var sinN=(mpSinP.length?mpSinP.length+' ingrediente'+(mpSinP.length>1?'s':''):'')+(mpSinP.length&&meSinP.length?' y ':'')+(meSinP.length?meSinP.length+' empaque'+(meSinP.length>1?'s':''):'');
    var spDismissed=(SS.dismissedNotifs||[]).indexOf('sinprecio')>=0;notifs.push({id:'sinprecio',type:'costo',title:'Sin precio registrado',body:sinN+' sin precio — costos imprecisos',action:"SS.cTab='mp';go('catalogo')",actionLabel:'Ver catálogo',color:'rgba(99,102,241,.8)',icon:'💲',dismissed:spDismissed});
  }
  return notifs;
}

  var ventas=[],margenes=[],mgPct=[],mpCosts=[],meCosts=[],envCosts=[],netGain=[],netMgPct=[];

  var gasData=gasNames.map(function(){return[];});
  for(var pi=0;pi<pers.length;pi++){
    var p=pers[pi];
    var pedsPer=D.ped.filter(function(ped){return ped.f&&ped.f.substring(0,7)===p;});
    var vTot=pedsPer.reduce(function(s,ped){return s+pedTot(ped.id);},0);
    var ganTot=pedsPer.reduce(function(s,ped){return s+pedGan(ped.id);},0);
    var mpC=pedsPer.reduce(function(s,ped){return s+D.pi.filter(function(i){return i.d===ped.id;}).reduce(function(s2,it){return s2+costoMp(it.pt)*it.q;},0);},0);
    var meC=pedsPer.reduce(function(s,ped){return s+D.pi.filter(function(i){return i.d===ped.id;}).reduce(function(s2,it){return s2+costoMe(it.pt)*it.q;},0);},0);
    var envC=pedsPer.reduce(function(s,ped){return s+(ped.pe||0);},0);
    // Compute total fixed costs for this period
    ventas.push(Math.round(vTot));
    margenes.push(Math.round(ganTot));
    mgPct.push(vTot?Math.round(ganTot/vTot*100):0);
    netGain.push(netGainPer2);
    netMgPct.push(netMgPer2);
    netGain.push(netGainPer2);
    netMgPct.push(netMgPer2);
    mpCosts.push(Math.round(mpC));
    meCosts.push(Math.round(meC));
    envCosts.push(Math.round(envC));
    var gi=D.gi.filter(function(g){return g.p===p;});
    for(var gi2=0;gi2<gasNames.length;gi2++){
      var catName=gasNames[gi2].split('/')[0].toLowerCase();
      var cat=D.cgi.find(function(c){return c.n&&c.n.toLowerCase().indexOf(catName)>=0;});
      gasData[gi2].push(cat?(gi.find(function(g){return g.c===cat.id;})||{v:0}).v:0);
    }
    // Compute net gain AFTER gasData is populated for this period
    var fixedCostsPer2=D.gi.filter(function(g){return g.p===p;}).reduce(function(s,g){return s+g.v;},0);
    var totalCostsPer2=Math.round(mpC+meC+envC+fixedCostsPer2);
    var netGainPer2=Math.max(0,Math.round(ganTot-fixedCostsPer2));
    var netMgPer2=ganTot>0?Math.round((ganTot-fixedCostsPer2)/Math.max(vTot,1)*100):0;
  }
  var stackColors=['rgba(16,185,129,.85)','rgba(200,24,79,.75)','rgba(99,102,241,.75)','rgba(245,158,11,.75)','rgba(59,130,246,.75)','rgba(239,68,68,.75)','rgba(156,163,175,.75)','rgba(251,146,60,.75)'];

  // Chart 1: Ventas + Margen columns + Margen% line
  var c1=document.getElementById('ch-ventas');
  if(c1){
    if(c1._chart)c1._chart.destroy();
    c1._chart=new Chart(c1,{
      type:'bar',
      data:{labels:labels,datasets:[
        {label:'Ventas',data:ventas,backgroundColor:'rgba(200,24,79,.8)',order:2,borderRadius:3},
        {label:'Ganancia bruta',data:margenes,backgroundColor:'rgba(16,185,129,.7)',order:2,borderRadius:3},
        {label:'Ganancia neta',data:netGain,backgroundColor:'rgba(59,130,246,.75)',order:2,borderRadius:3},
        {label:'Margen bruto %',data:mgPct,type:'line',borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',yAxisID:'y2',pointRadius:5,pointBackgroundColor:'#10b981',fill:false,tension:0.3,order:1},
        {label:'Margen neto %',data:netMgPct,type:'line',borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.08)',yAxisID:'y2',pointRadius:5,pointBackgroundColor:'#f59e0b',fill:false,tension:0.3,order:1}
      ]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:10}}},
        scales:{
          y:{beginAtZero:true,ticks:{callback:function(v){return '$'+Math.round(v/1000)+'k';},maxTicksLimit:5}},
          y2:{position:'right',beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';},maxTicksLimit:5},grid:{drawOnChartArea:false}}
        }
      }
    });
  }

  // Chart 2: Stacked columns + ganancia% line
  var c2=document.getElementById('ch-costos');
  if(c2){
    if(c2._chart)c2._chart.destroy();
    // Calculate net margin % = (ventas - all costs) / ventas
    var netMgPct=ventas.map(function(v,i){
      if(!v)return 0;
      var totalCosts=mpCosts[i]+meCosts[i]+envCosts[i];
      for(var g=0;g<gasData.length;g++)totalCosts+=gasData[g][i];
      return Math.round((v-totalCosts)/v*100);
    });
    // Net gain per period = ventas - all costs
    var netGain=ventas.map(function(v,i){
      var totalCosts=mpCosts[i]+meCosts[i]+envCosts[i];
      for(var g=0;g<gasData.length;g++)totalCosts+=gasData[g][i];
      return Math.max(0,Math.round(v-totalCosts));
    });
    // Build cost items sorted biggest→bottom
    var rawCosts=[
      {label:'Ingredientes',data:mpCosts,color:'rgba(200,24,79,.75)'},
      {label:'Empaques',data:meCosts,color:'rgba(99,102,241,.75)'},
      {label:'Envío',data:envCosts,color:'rgba(245,158,11,.75)'}
    ];
    for(var gi3=0;gi3<gasNames.length;gi3++){
      rawCosts.push({label:gasNames[gi3],data:gasData[gi3],color:stackColors[4+gi3]||'rgba(156,163,175,.6)'});
    }
    rawCosts.sort(function(a,b){
      var sa=a.data.reduce(function(x,v){return x+v;},0);
      var sb=b.data.reduce(function(x,v){return x+v;},0);
      return sb-sa;
    });
    var datasets=rawCosts.map(function(d){return{label:d.label,data:d.data,backgroundColor:d.color,stack:'s',borderRadius:0};});

    c2._chart=new Chart(c2,{
      type:'bar',
      data:{labels:labels,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:8}}},
        scales:{
          x:{stacked:true},
          y:{stacked:true,beginAtZero:true,ticks:{callback:function(v){return '$'+Math.round(v/1000)+'k';},maxTicksLimit:5}}
        }
      }
    });
  }
}

function doChangePassword(){
  var oldPwd=($('cfg-pwd-old')&&$('cfg-pwd-old').value||'').trim();
  var newPwd=($('cfg-pwd-new')&&$('cfg-pwd-new').value||'').trim();
  var confPwd=($('cfg-pwd-confirm')&&$('cfg-pwd-confirm').value||'').trim();
  var msg=document.getElementById('cfg-pwd-msg');
  function setMsg(txt,ok){if(msg)msg.innerHTML='<div style="font-size:13px;padding:10px;border-radius:8px;margin-bottom:10px;background:'+(ok?'var(--gnb)':'var(--rdb)')+';color:'+(ok?'var(--gn)':'var(--rd)')+';border:1px solid '+(ok?'var(--gnr)':'var(--rdr)')+'">'+txt+'</div>';}
  if(!oldPwd){setMsg('❌ Ingresá tu contraseña actual',false);return;}
  if(!newPwd||newPwd.length<6){setMsg('❌ La nueva contraseña debe tener al menos 6 caracteres',false);return;}
  if(newPwd!==confPwd){setMsg('❌ Las contraseñas no coinciden',false);return;}
  var user=window._auth&&window._auth.currentUser;
  if(!user){setMsg('❌ No hay sesión activa',false);return;}
  var cred=window._fbEmailAuthProvider.credential(user.email,oldPwd);
  window._fbReauth(user,cred)
    .then(function(){return window._fbUpdatePassword(user,newPwd);})
    .then(function(){
      setMsg('✅ Contraseña actualizada correctamente',true);
      if($('cfg-pwd-old'))$('cfg-pwd-old').value='';
      if($('cfg-pwd-new'))$('cfg-pwd-new').value='';
      if($('cfg-pwd-confirm'))$('cfg-pwd-confirm').value='';
    })
    .catch(function(e){
      var txt='❌ Error al cambiar la contraseña';
      if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')txt='❌ La contraseña actual es incorrecta';
      if(e.code==='auth/too-many-requests')txt='❌ Demasiados intentos, esperá unos minutos';
      setMsg(txt,false);
    });
}

// ═══════════════════════════════════════════════════════
//  STATE VARIABLES (needed for new screens)
// ═══════════════════════════════════════════════════════
var NPT={step:1,n:'',c:'cp1',v:'',recItems:[],recTab:'MP',recAdd:false,_srMp:'',_srMe:'',yields:1};
var NCO={type:'MP',items:[],f:'',pv:'',showAdd:false};
var editCliId='';

var cpSr='',cpFl='todos';

// ═══════════════════════════════════════════════════════
//  CREAR PRODUCTO (3 pasos)
// ═══════════════════════════════════════════════════════
function updPtMgFromRec(){
  var co=NPT.recItems.reduce(function(s,i){return s+(i.t==='MP'?latMp(i.i):latMe(i.i))*i.q;},0);
  updPtMg(co);
}
function updPtMg(co){
  var inp=$('pt-v2'); if(!inp) return;
  var v=parseFloat(inp.value)||0;
  NPT.v=String(v);
  var m=v>0?pct(v-co,v):0;
  var el=$('pt-mg2'); if(el) el.innerHTML=mgTxt(m);
}
function mgTxt(m){return 'Margen: <b style="color:'+(m>=50?'var(--gn)':m>=35?'var(--am)':'var(--rd)')+'">'+m+'%</b>';}

// ─── Navegación del flujo de creación de producto ────
function nptGoStep2(){
  var n=($('pt-n')&&$('pt-n').value||'').trim();
  if(!n){showToast('❌ El nombre es obligatorio');return;}
  NPT.n=n;
  NPT.c=($('pt-c')&&$('pt-c').value||'');
  NPT.step=2;
  renderCreatePT();
}
function nptGoStep3(){
  var n=($('pt-n')&&$('pt-n').value||'').trim();
  if(!n){showToast('❌ El nombre es obligatorio');return;}
  NPT.n=n;
  NPT.c=($('pt-c')&&$('pt-c').value||'');
  NPT.recItems=[];
  NPT.step=3;
  renderCreatePT();
}

function renderCreatePT(){
  var st=NPT.step;
  var co=NPT.recItems.reduce(function(s,i){return s+(i.t==='MP'?latMp(i.i):latMe(i.i))*i.q;},0);
  var vv=parseFloat(NPT.v)||0,mg=vv>0?pct(vv-co,vv):0;
  var bkFn=st>1?'NPT.step--;renderCreatePT()':"go('catalogo')";
  $('H').innerHTML='<div class="hd"><button class="bb" onclick="'+bkFn+'">← '+(st>1?'Atrás':'Catálogo')+'</button><div class="hr"><div class="ht">Nuevo producto</div></div></div>';
  var h='<div class="p">'+dots(st,3);

  if(st===1){
    var catOpts='<option value="">— Sin categoría —</option>'+(D.cpt||[]).slice().sort(function(a,b){return a.n.localeCompare(b.n);}).map(function(c){return '<option value="'+c.id+'"'+(c.id===NPT.c?' selected':'')+'>'+ptEmoji(c.id)+' '+esc(c.n)+'</option>';}).join('');
    h+='<p style="font-size:16px;font-weight:600;color:var(--t1);margin-bottom:4px;font-family:DM Sans,sans-serif">Datos del producto</p>';
    h+='<p style="font-size:13px;color:var(--t2);margin-bottom:18px">Ingresá el nombre y la categoría. El precio lo definís al final, una vez calculado el costo.</p>';
    h+=fg('Nombre *','<input class="fi" id="pt-n" value="'+esc(NPT.n)+'" placeholder="ej: Budín de limón 1.2kg" oninput="NPT.n=this.value">');
    h+=fg('Categoría','<select class="fs" id="pt-c" onchange="if(this.value===\'__new__\'){showPtCatNew();}else{hidePtCatNew();NPT.c=this.value;}">'+catOpts+'<option value="__new__">+ Nueva categoría...</option></select>');
    h+='<div id="pt-cat-new" style="display:none;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:-4px;margin-bottom:8px">';
    h+='<div class="fg"><label class="fl">Nombre *</label><input class="fi" id="pt-cat-n" placeholder="ej: Alfajores, Panes..."></div>';
    h+='<div style="display:flex;gap:8px"><button class="btn bs2" style="flex:1" onclick="hidePtCatNew()">Cancelar</button><button class="btn bp" style="flex:2" onclick="savePtNewCat()">✓ Crear</button></div>';
    h+='</div>';

    h+='<button class="btn bp" onclick="nptGoStep2()">Siguiente — Cargar receta →</button>';
    h+='<button class="btn bs2" onclick="nptGoStep3()">Guardar sin receta por ahora</button>';
  }
  if(st===2){
    // Live cost/margin bar
    h+='<div class="bx" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;padding:12px;margin-bottom:14px">';
    h+='<div style="text-align:center"><div class="kl">Costo</div><div style="font-size:17px;font-weight:700;color:var(--t1)">'+fmt(co)+'</div></div>';
    h+='<div style="text-align:center;border-left:1px solid var(--bd);border-right:1px solid var(--bd)"><div class="kl">Precio</div><div style="font-size:17px;font-weight:700;color:var(--br)">'+fmt(vv)+'</div></div>';
    h+='<div style="text-align:center"><div class="kl">Margen</div><div style="font-size:17px;font-weight:700;color:'+(mg>=50?'var(--gn)':mg>=35?'var(--am)':'var(--rd)')+'">'+mg+'%</div></div>';
    h+='</div>';
    // Current recipe items
    if(NPT.recItems.length){
      h+='<div class="sc" style="margin-top:0">Receta actual</div>';
      h+='<div class="bx" style="padding:4px 14px;margin-bottom:8px">';
      for(var i=0;i<NPT.recItems.length;i++){
        var ri=NPT.recItems[i],riId=ri.i,riIdx=i;
        var nm=ri.t==='MP'?(D.mp.find(function(m){return m.id===riId;})||{n:'?',u:'u'}):(D.me.find(function(m){return m.id===riId;})||{n:'?',u:'u'});
        var riCost=(ri.t==='MP'?latMp(riId):latMe(riId))*ri.q;
        h+='<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:'+(i<NPT.recItems.length-1?'1px solid var(--bd2)':'none')+'">';
        h+='<span style="font-size:16px">'+(ri.t==='MP'?'🌿':'📦')+'</span>';
        h+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--t1)">'+esc(nm.n)+'</div><div style="font-size:12px;color:var(--t3)">'+ri.q+' '+nm.u+' · '+fmt(riCost)+'</div></div>';
        h+='<div style="display:flex;align-items:center;gap:6px">';
        h+='<button onclick="NPT.recItems['+riIdx+'].q=Math.max(0.01,+(NPT.recItems['+riIdx+'].q-0.5).toFixed(2));renderCreatePT()" style="width:28px;height:28px;border:none;border-radius:50%;background:var(--bd);color:var(--t1);cursor:pointer;font-size:14px">-</button>';
        h+='<input type="number" value="'+ri.q+'" step="0.01" min="0.01" onblur="var v=parseFloat(this.value),ri2=NPT.recItems['+riIdx+'];if(ri2&&v>0)ri2.q=+v.toFixed(3);renderCreatePT()" style="width:54px;border:1px solid var(--bd);border-radius:6px;padding:3px 5px;font-size:13px;font-weight:500;text-align:center;background:var(--bg)" inputmode="decimal">';
        h+='<button onclick="NPT.recItems['+riIdx+'].q=+(NPT.recItems['+riIdx+'].q+0.5).toFixed(2);renderCreatePT()" style="width:28px;height:28px;border:none;border-radius:50%;background:var(--bd);color:var(--t1);cursor:pointer;font-size:14px">+</button>';
        h+='<button onclick="NPT.recItems.splice('+riIdx+',1);renderCreatePT()" style="width:28px;height:28px;border:none;border-radius:50%;background:none;color:var(--t3);cursor:pointer;font-size:16px">×</button>';
        h+='</div></div>';
      }
      h+='</div>';
    }
    // Add ingredient search
    h+='<div class="sc" style="margin-top:0">Agregar ingredientes 🌿</div>';
    h+='<div style="position:relative;margin-bottom:8px;display:flex;gap:8px;align-items:center">';
    h+='<div style="position:relative;flex:1">';
    h+='<input class="fi" id="rec-sr-mp" placeholder="Buscar ingrediente..." value="'+esc(NPT._srMp||'')+'" oninput="NPT._srMp=this.value;updRecSrMp()" style="padding-right:36px;margin-bottom:0">';
    h+='<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none">🔍</span>';
    h+='</div>';
    h+='<button onclick="openNewMpModal()" style="flex-shrink:0;padding:10px 14px;border-radius:var(--r1);border:1.5px dashed var(--br);background:var(--brl);color:var(--br);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:DM Sans,sans-serif">+ Nuevo</button>';
    h+='</div>';
    h+='<div id="rec-sr-mp-res">';
    var srMp=(NPT._srMp||'').toLowerCase();
    var visMps=D.mp.filter(function(m){return !srMp||m.n.toLowerCase().indexOf(srMp)>=0;}).slice(0,srMp?20:8);
    if(visMps.length){
      h+='<div class="bx" style="padding:4px 14px;margin-bottom:12px">';
      for(var i=0;i<visMps.length;i++){
        var mp=visMps[i],mpid=mp.id;
        var alreadyIn=NPT.recItems.find(function(r){return r.t==='MP'&&r.i===mpid;});
        var mpPr=latMp(mpid);
        h+='<div style="display:flex;align-items:center;padding:9px 0;border-bottom:'+(i<visMps.length-1?'1px solid var(--bd2)':'none')+';cursor:pointer" onclick="addRecItem(\'MP\',\''+mpid+'\')">';
        h+='<span style="font-size:15px;margin-right:8px">🌿</span>';
        h+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--t1)">'+esc(mp.n)+'</div><div style="font-size:12px;color:var(--t3)">'+fmt(mpPr)+'/'+mp.u+'</div></div>';
        h+='<span style="font-size:20px;color:'+(alreadyIn?'var(--gn)':'var(--br)')+';">'+(alreadyIn?'✓':'+')+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
    // Cantidad producida por receta
    h+='<div class="bx" style="padding:12px 14px;margin-bottom:12px;background:var(--brll);border-color:var(--brb)">';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<span style="font-size:18px">🍽️</span>';
    h+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--br);margin-bottom:4px">¿Cuántas unidades produce esta receta?</div>';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<input type="number" id="npt-yields" class="fi" value="'+(NPT.yields||1)+'" min="1" step="1" inputmode="numeric" oninput="NPT.yields=parseInt(this.value)||1;updYieldsDisplay()" style="width:80px;padding:7px 10px;font-size:15px;font-weight:700;text-align:center">';
    h+='<span id="npt-yields-lbl" style="font-size:13px;color:var(--t2)">'+((NPT.yields||1)===1?'unidad':'unidades')+'</span>';
    h+='</div></div>';
    h+='<div style="text-align:right;font-size:12px;color:var(--t2)">Costo<br><b id="npt-cost-unit" style="font-size:15px;color:var(--t1)">'+(co>0?fmt(Math.round(co/(NPT.yields||1)))+'/u':'—')+'</b></div>';
    h+='</div></div>';
    // Add empaque search
    h+='<div class="sc">Agregar empaque 📦</div>';
    h+='<div style="position:relative;margin-bottom:8px;display:flex;gap:8px;align-items:center">';
    h+='<div style="position:relative;flex:1">';
    h+='<input class="fi" id="rec-sr-me" placeholder="Buscar material de empaque..." value="'+esc(NPT._srMe||'')+'" oninput="NPT._srMe=this.value;updRecSrMe()" style="padding-right:36px;margin-bottom:0">';
    h+='<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none">🔍</span>';
    h+='</div>';
    h+='<button onclick="openNewMeModal()" style="flex-shrink:0;padding:10px 14px;border-radius:var(--r1);border:1.5px dashed var(--br);background:var(--brl);color:var(--br);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:DM Sans,sans-serif">+ Nuevo</button>';
    h+='</div>';
    h+='<div id="rec-sr-me-res">';
    var srMe=(NPT._srMe||'').toLowerCase();
    var visMes=D.me.filter(function(m){return !srMe||m.n.toLowerCase().indexOf(srMe)>=0;}).slice(0,srMe?20:6);
    if(visMes.length){
      h+='<div class="bx" style="padding:4px 14px;margin-bottom:12px">';
      for(var i=0;i<visMes.length;i++){
        var me=visMes[i],meid=me.id;
        var alreadyInMe=NPT.recItems.find(function(r){return r.t==='ME'&&r.i===meid;});
        var mePr=latMe(meid);
        h+='<div style="display:flex;align-items:center;padding:9px 0;border-bottom:'+(i<visMes.length-1?'1px solid var(--bd2)':'none')+';cursor:pointer" onclick="addRecItem(\'ME\',\''+meid+'\')">';
        h+='<span style="font-size:15px;margin-right:8px">📦</span>';
        h+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--t1)">'+esc(me.n)+'</div><div style="font-size:12px;color:var(--t3)">'+fmt(mePr)+'/'+me.u+'</div></div>';
        h+='<span style="font-size:20px;color:'+(alreadyInMe?'var(--gn)':'var(--br)')+';">'+(alreadyInMe?'✓':'+')+'</span>';
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
    h+='<div style="display:flex;gap:8px">';
    h+='<button class="btn bs2" style="flex:1" onclick="NPT.recItems=[];NPT.step=3;renderCreatePT()">Omitir receta</button>';
    h+='<button class="btn bp" style="flex:2" onclick="NPT.step=3;renderCreatePT()">Siguiente →</button>';
    h+='</div>';
  }

  if(st===3){
    var co2=NPT.recItems.reduce(function(s,i){return s+(i.t==='MP'?latMp(i.i):latMe(i.i))*i.q;},0);
    var costoUn=co2/(NPT.yields||1);
    var sugerido=co2>0?Math.ceil(costoUn/0.60):0; // margen 40%: precio = costo/(1-0.40)
    // Si NPT.v está vacío, proponer el sugerido
    if(!NPT.v&&sugerido>0)NPT.v=String(sugerido);
    var vv2=parseFloat(NPT.v)||0;
    var mg2=vv2>0?pct(vv2-co2,vv2):0;
    h+='<p style="font-size:16px;font-weight:600;color:var(--t1);margin-bottom:4px;font-family:DM Sans,sans-serif">Definí el precio de venta</p>';
    h+='<p style="font-size:13px;color:var(--t2);margin-bottom:16px">El costo está calculado. Fijá un precio que te deje un margen saludable.</p>';
    // Resumen de costo
    h+='<div class="bx" style="margin-bottom:14px;padding:14px 16px">';
    h+='<div class="rp"><span>Costo total receta</span><span style="font-weight:700;color:var(--t1)">'+fmt(co2)+'</span></div>';
    if(NPT.yields>1)h+='<div class="rp"><span>Costo por unidad ('+NPT.yields+' u)</span><span style="font-weight:700;color:var(--t1)">'+fmt(costoUn)+'</span></div>';
    h+='<div class="rp"><span>Ingredientes</span><span>'+NPT.recItems.length+'</span></div>';
    h+='</div>';
    // Precio sugerido
    if(sugerido>0){
      h+='<div style="background:var(--brl);border:1px solid var(--brb);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
      h+='<div><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Precio sugerido (40% margen)</div>';
      h+='<div style="font-size:22px;font-weight:800;color:var(--br);font-family:DM Sans,sans-serif">'+fmt(sugerido)+'</div></div>';
      h+='<button onclick="document.getElementById(\'pt-v2\').value='+sugerido+';NPT.v=\''+sugerido+'\';updPtMgFromRec()" class="btn bp" style="min-width:80px;padding:8px 14px;font-size:13px">Usar</button>';
      h+='</div>';
    }
    h+=fg('Precio de catálogo ($)','<input class="fi" type="number" id="pt-v2" value="'+esc(NPT.v)+'" oninput="NPT.v=this.value;updPtMgFromRec()" placeholder="ej: '+sugerido+'" inputmode="decimal">');
    h+='<div id="pt-mg2" style="font-size:13px;color:var(--t2);margin-top:-8px;margin-bottom:14px">'+mgTxt(mg2)+'</div>';
    h+='<button class="btn bp" onclick="savePT()">✓ Crear producto</button>';
  }
  h+='</div>';setC(h);
}
function nptAddItem(){
  var s=$('npt-sel'),q=$('npt-qty');if(!s||!q)return;
  var id=s.value,qty=parseFloat(q.value)||0;
  if(!id||!qty){alert('Seleccioná e ingresá la cantidad');return;}
  NPT.recItems.push({t:NPT.recTab,i:id,q:qty});NPT.recAdd=false;renderCreatePT();
}
function savePT(){
  var n=NPT.n.trim();if(!n){showToast('❌ El nombre es obligatorio');return;}
  var pv=parseFloat(($('pt-v2')?$('pt-v2').value:NPT.v))||0;
  if(!pv||pv<=0){
    showToast('❌ El precio debe ser mayor a cero');
    var inp=document.getElementById('pt-v2');if(inp){inp.focus();inp.style.borderColor='var(--rd)';}
    return;
  }
  var id=uid();
  (D.pt=D.pt||[]).push({id:id,n:n,c:NPT.c,v:pv,yields:NPT.yields||1});
  NPT.recItems.forEach(function(it){(D.rec=D.rec||[]).push({id:uid(),pt:id,t:it.t,i:it.i,q:it.q});});
  saveD();NPT={step:1,n:'',c:'cp1',v:'',recItems:[],recTab:'MP',recAdd:false,yields:1};SS.cTab='productos';go('catalogo');
}

// ═══════════════════════════════════════════════════════
//  REGISTRAR COMPRA
// ═══════════════════════════════════════════════════════
function renderRegistrarCompra(){
  setH('Registrar compra','Actualiza precios automáticamente','catalogo','Catálogo','');
  if(!NCO.f)NCO.f=toStr();
  var pvOpts=(D.pvs||[]).map(function(v){return '<option value="'+v.id+'"'+(v.id===NCO.pv?' selected':'')+'>'+esc(v.n)+'</option>';}).join('');
  var h='<div class="p">'+alrt('i','Ingresá total gastado y cantidad comprada. El precio unitario se calcula solo.');
  h+='<div style="display:flex;gap:8px;margin-bottom:16px">';
  h+='<div class="ro'+(NCO.type==='MP'?' on':'')+'" onclick="NCO.type=\'MP\';NCO.items=[];NCO.showAdd=false;renderRegistrarCompra()">🌿 Ingredientes</div>';
  h+='<div class="ro'+(NCO.type==='ME'?' on':'')+'" onclick="NCO.type=\'ME\';NCO.items=[];NCO.showAdd=false;renderRegistrarCompra()">📦 Empaque</div>';
  h+='</div>';
  h+=fg('Proveedor (opcional)','<select class="fs" onchange="NCO.pv=this.value"><option value="">— Seleccioná —</option>'+pvOpts+'</select>');
  h+=fg('Fecha de compra','<input class="fi" type="date" id="co-f" value="'+NCO.f+'" onchange="NCO.f=this.value">');
  h+='<div class="sc">Ítems comprados</div>';
  if(!NCO.items.length)h+='<div style="color:var(--t3);font-size:13px;margin-bottom:10px">Sin ítems. Tocá para agregar.</div>';
  NCO.items.forEach(function(it,idx){
    var src=NCO.type==='MP'?(D.mp||[]):(D.me||[]);
    var obj=(src.find(function(m){return m.id===it.id;}))||{n:'?',u:''};
    var pxU=it.qty>0?Math.round(it.total/it.qty):0;
    h+='<div class="bx" style="padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:500;color:var(--t1)">'+esc(obj.n)+'</div><span class="rr-d" onclick="NCO.items.splice('+idx+',1);renderRegistrarCompra()">×</span></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<div><label class="fl">Total gastado ($)</label><input class="fi" type="number" placeholder="ej: 8400" value="'+(it.total||'')+'" onchange="NCO.items['+idx+'].total=parseFloat(this.value)||0;renderRegistrarCompra()"></div>';
    h+='<div><label class="fl">Cantidad ('+esc(obj.u)+')</label><input class="fi" type="number" placeholder="ej: 2" value="'+(it.qty||'')+'" onchange="NCO.items['+idx+'].qty=parseFloat(this.value)||0;renderRegistrarCompra()"></div></div>';
    if(pxU>0)h+='<div style="margin-top:8px;font-size:12px;color:var(--gn);font-weight:600">→ Precio unitario: '+fmt(pxU)+'/'+esc(obj.u)+'</div>';
    else if(it.total>0||it.qty>0)h+='<div style="margin-top:6px;font-size:11px;color:var(--am)">Completá ambos campos para calcular</div>';
    h+='</div>';
  });
  if(NCO.showAdd){
    var src2=NCO.type==='MP'?(D.mp||[]):(D.me||[]);
    var used=NCO.items.map(function(i){return i.id;});
    var avail=src2.filter(function(m){return used.indexOf(m.id)<0;});
    var aOpts=avail.map(function(m){return '<option value="'+m.id+'">'+esc(m.n)+' (por '+m.u+')</option>';}).join('');
    h+='<div class="adf">'+fg('Seleccioná '+(NCO.type==='MP'?'el ingrediente':'el material'),'<select class="fs" id="co-sel"><option value="">— Seleccioná —</option>'+aOpts+'</select>')+'<div style="display:flex;gap:8px"><button class="btn bs2" style="flex:1" onclick="NCO.showAdd=false;renderRegistrarCompra()">Cancelar</button><button class="btn bp" style="flex:2" onclick="coAddItem()">Agregar</button></div></div>';
  } else {
    h+='<button class="btn bs2" onclick="NCO.showAdd=true;renderRegistrarCompra()">+ Agregar '+(NCO.type==='MP'?'ingrediente':'material')+'</button>';
  }
  h+='<div class="dv"></div><button class="btn bp"'+(NCO.items.length?'':' disabled')+' onclick="saveCompra()">Confirmar y actualizar precios</button>';
  h+='</div>';setC(h);
}
function coAddItem(){var s=$('co-sel');if(!s||!s.value){alert('Seleccioná un ítem');return;}NCO.items.push({id:s.value,total:0,qty:0});NCO.showAdd=false;renderRegistrarCompra();}
function saveCompra(){
  if(!NCO.items.length){alert('Agregá al menos un ítem');return;}
  var fVal=($('co-f')?$('co-f').value:null)||toStr();
  var allOk=NCO.items.every(function(it){return it.qty>0&&it.total>0;});
  if(!allOk){alert('Completá cantidad y total para cada ítem');return;}
  NCO.items.forEach(function(it){
    var pxU=Math.round(it.total/it.qty);
    if(NCO.type==='MP')(D.mpp=D.mpp||[]).push({id:uid(),m:it.id,v:pxU,f:fVal,pv:NCO.pv});
    else(D.mep=D.mep||[]).push({id:uid(),m:it.id,v:pxU,f:fVal});
  });
  saveD();NCO={type:'MP',items:[],f:toStr(),pv:'',showAdd:false};SS.cTab='mp';go('catalogo');
}

function doLogin(){
  var email=(document.getElementById('l-email')||{}).value||'';
  var pass=(document.getElementById('l-pass')||{}).value||'';
  if(!email||!pass){renderLogin('Completá email y contraseña');return;}
  window._fbSignIn(window._auth,email,pass)
    .catch(function(e){
      var msg='Error al iniciar sesión';
      if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password')msg='Email o contraseña incorrectos';
      if(e.code==='auth/user-not-found')msg='No existe una cuenta con ese email';
      if(e.code==='auth/too-many-requests')msg='Demasiados intentos. Esperá unos minutos.';
      renderLogin(msg);
    });

function doRegister(){
  var neg=(document.getElementById('r-neg')||{}).value||'';
  var email=(document.getElementById('r-email')||{}).value||'';
  var pass=(document.getElementById('r-pass')||{}).value||'';
  if(!neg){renderLogin('Ingresá el nombre de tu negocio');showLoginTab('up');return;}
  if(!email||!pass){renderLogin('Completá todos los campos');showLoginTab('up');return;}
  if(pass.length<6){renderLogin('La contraseña debe tener al menos 6 caracteres');showLoginTab('up');return;}
  window._fbSignUp(window._auth,email,pass)
    .then(function(cred){
      var seed=JSON.parse(JSON.stringify(SEED_EMPTY));
      seed.neg={nombre:neg};
      return window._fbSetDoc(window._fbDoc(window._db,'users',cred.user.uid),seed);
    })
    .catch(function(e){
      var msg='Error al crear cuenta';
      if(e.code==='auth/email-already-in-use')msg='Ya existe una cuenta con ese email';
      if(e.code==='auth/invalid-email')msg='El email no es válido';
      renderLogin(msg);showLoginTab('up');
    });
}

function doLogout(){
  window._fbSignOut(window._auth).then(function(){renderLogin();});
}
