// Catalogo search
function updCatSr(){
  var res=$('cat-sr-res');
  if(!res){renderCatalogo();return;}
  var tab=SS.cTab||'productos';
  var term=(SS.cSr||'').toLowerCase();
  var fl=SS.cFl||'todos';
  var h='';
  if(tab==='productos'){
    var pts=D.pt.filter(function(p){return(!term||p.n.toLowerCase().indexOf(term)>=0)&&(fl==='todos'||p.c===fl);});
    var sortBy=SS.ptSort||'az';
    if(sortBy==='az')pts.sort(function(a,b){return a.n.localeCompare(b.n,'es');});
    else if(sortBy==='za')pts.sort(function(a,b){return b.n.localeCompare(a.n,'es');});
    else if(sortBy==='prc-hi')pts.sort(function(a,b){return b.v-a.v;});
    else if(sortBy==='prc-lo')pts.sort(function(a,b){return a.v-b.v;});
    else if(sortBy==='mg-hi')pts.sort(function(a,b){return pct(b.v-costo(b.id),b.v)-pct(a.v-costo(a.id),a.v);});
    else if(sortBy==='mg-lo')pts.sort(function(a,b){return pct(a.v-costo(a.id),a.v)-pct(b.v-costo(b.id),b.v);});
    if(!pts.length){h='<div style="text-align:center;padding:24px;color:var(--t3);font-size:14px">Sin resultados</div>';}
    for(var i=0;i<pts.length;i++){
      var pt=pts[i],ptid=pt.id;
      var co=costo(pt.id),mg=pt.v?pct(pt.v-co,pt.v):0;
      var cat=D.cpt.find(function(c){return c.id===pt.c;});
      var hr=D.rec.some(function(r){return r.pt===pt.id;});
      var right='<div style="font-size:15px;font-weight:600;color:var(--br)">'+fmt(pt.v)+'</div>'+(co?'<div style="font-size:12px;color:'+(mg>=50?'var(--gn)':mg>=35?'var(--am)':'var(--rd)')+'">'+mg+'% mg</div>':'');
      h+=li2(initAv(pt.n),pt.n,esc(cat?cat.n:'')+(hr?'':'&nbsp;&nbsp;'+bdg('Sin receta','bga')),right,"rcInit('"+ptid+"');go('createReceta')");
    }
  } else if(tab==='mp'){
    var mps=D.mp.filter(function(m){return(!term||m.n.toLowerCase().indexOf(term)>=0)&&(fl==='todos'||m.c===fl);});
    var sortMp=SS.mpSort||'az';
    if(sortMp==='az')mps.sort(function(a,b){return a.n.localeCompare(b.n,'es');});
    else if(sortMp==='za')mps.sort(function(a,b){return b.n.localeCompare(a.n,'es');});
    else if(sortMp==='prc-hi')mps.sort(function(a,b){var pa=D.mpp.filter(function(p){return p.m===a.id;}).sort(function(x,y){return y.f.localeCompare(x.f);})[0];var pb=D.mpp.filter(function(p){return p.m===b.id;}).sort(function(x,y){return y.f.localeCompare(x.f);})[0];return(pb?pb.v:0)-(pa?pa.v:0);});
    else if(sortMp==='prc-lo')mps.sort(function(a,b){var pa=D.mpp.filter(function(p){return p.m===a.id;}).sort(function(x,y){return y.f.localeCompare(x.f);})[0];var pb=D.mpp.filter(function(p){return p.m===b.id;}).sort(function(x,y){return y.f.localeCompare(x.f);})[0];return(pa?pa.v:0)-(pb?pb.v:0);});
    if(!mps.length){h='<div style="text-align:center;padding:24px;color:var(--t3);font-size:14px">Sin resultados</div>';}
    for(var i=0;i<mps.length;i++){
      var mp=mps[i],mpid=mp.id;
      var ph=D.mpp.filter(function(p){return p.m===mpid;}).sort(function(a,b){return b.f.localeCompare(a.f);});
      var pr=ph[0]?ph[0].v:0,dl=ph[1]?pct(pr-ph[1].v,ph[1].v):0;

      h+=li2(initAv(mp.n),mp.n,esc(cat?cat.n:'')+' · por '+mp.u,right,"go('mpDet',{id:'"+mpid+"'})");
    }
  } else if(tab==='me'){
    var mes=D.me.filter(function(m){return(!term||m.n.toLowerCase().indexOf(term)>=0)&&(fl==='todos'||m.c===fl);});
    if(!mes.length){h='<div style="text-align:center;padding:24px;color:var(--t3);font-size:14px">Sin resultados</div>';}
    for(var i=0;i<mes.length;i++){
      var me=mes[i],meid=me.id;
      var phe=D.mep.filter(function(p){return p.m===meid;}).sort(function(a,b){return b.f.localeCompare(a.f);});
      var pre=phe[0]?phe[0].v:0,dle=phe[1]?pct(pre-phe[1].v,phe[1].v):0;

function addRecItem(type,id){
  if(!NPT.recItems.find(function(r){return r.t===type&&r.i===id;})){

    if(type==='MP'){NPT._srMp='';} else {NPT._srMe='';}

  renderCreatePT();
}

  var recCount=D.rec.filter(function(r){return r.pt===ptId;}).length;

      '<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px" id="del-pt-confirm">'

      +'<div style="font-size:17px;font-weight:700;color:var(--t1);margin-bottom:8px">¿Eliminar \"'+esc(pt.n)+'\"?</div>'
      +'<div style="font-size:13px;color:var(--t2);margin-bottom:16px">'
      +(recCount?'Se eliminará la receta con '+recCount+' ingrediente'+(recCount>1?'s':'')+'.<br>':'')
      +(usedIn?'Aparece en '+usedIn+' pedido'+(usedIn>1?'s históricos (se conservan los datos)':' histórico (se conservan los datos)')+'.<br>':'')
      +'Esta acción no se puede deshacer.</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn bs2" style="flex:1" onclick="document.getElementById(\'del-pt-confirm\').remove()">Cancelar</button>'
      +'<button class="btn bp" style="flex:2;background:var(--rd);border-color:var(--rd)" onclick="document.getElementById(\'del-pt-confirm\').remove();delPtConfirmed(\''+ptId+'\')" >Sí, eliminar</button>'

    return;

  delPtConfirmed(ptId);
}

  SS.cTab='productos';

    +'<div class="fg"><label class="fl">Categoría</label><select class="fs" id="me-modal-c" onchange="meModalCatChg(this.value)">'+catOpts+'</select></div>'
    +'<div id="me-modal-cat-new" style="display:none;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:-6px;margin-bottom:8px">'
    +'<div class="fg"><label class="fl">Nombre de la categoría *</label><input class="fi" id="me-modal-cat-n" placeholder="ej: Cajas"></div>'
    +'<div style="display:flex;gap:8px"><button class="btn bs2" style="flex:1;padding:10px" onclick="meModalCatCancel()">Cancelar</button><button class="btn bp" style="flex:2;padding:10px" onclick="meModalCatSave()">✓ Crear</button></div>'
    +'</div>'
    +'<div class="fg"><label class="fl">Proveedor habitual</label><select class="fs" id="me-modal-pv" onchange="meModalPvChg(this.value)"><option value="">— Sin proveedor —</option>'+meModalPvOpts()+'<option value="__new__">+ Agregar proveedor...</option></select></div>'+'<div id="me-modal-pv-new" style="display:none;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:-6px;margin-bottom:8px">'+'<div class="fg"><label class="fl">Nombre del proveedor *</label><input class="fi" id="me-modal-pv-n" placeholder="ej: Caja Express"></div>'+'<div style="display:flex;gap:8px"><button class="btn bs2" style="flex:1;padding:10px" onclick="meModalPvCancel()">Cancelar</button><button class="btn bp" style="flex:2;padding:10px" onclick="meModalPvSave()">✓ Crear</button></div>'+'</div>'+'<div class="fg"><label class="fl">Unidad de medida</label><select class="fs" id="me-modal-u" onchange="meModalUpdAllLabels()"><option value="u">u (unidad)</option><option value="cm">cm (centímetro)</option><option value="m">m (metro)</option><option value="kg">kg (kilogramo)</option><option value="g">g (gramo)</option></select></div>'
    +'<div class="dv"></div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px">Precio inicial (opcional)</div>'
    +'<div style="display:flex;gap:0;margin-bottom:12px;border:1px solid var(--bd);border-radius:8px;overflow:hidden">'
    +'<button id="me-modal-m-unit" onclick="meModeUnit()" style="flex:1;padding:8px;border:none;background:var(--br);color:#fff;cursor:pointer;font-size:12px;font-weight:600">Precio por unidad</button>'
    +'<button id="me-modal-m-total" onclick="meModeTotal()" style="flex:1;padding:8px;border:none;background:var(--bd);color:var(--t2);cursor:pointer;font-size:12px">Total + cantidad</button>'
    +'</div>'
    +'<div id="me-modal-mode-unit">'
    +'<div class="fg"><label class="fl" id="me-modal-price-lbl">Precio por u ($)</label><input class="fi" type="number" id="me-modal-prc" placeholder="0" inputmode="decimal" oninput="meModalUpdLabel()"></div>'
    +'</div>'
    +'<div id="me-modal-mode-total" style="display:none">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div class="fg"><label class="fl">Total gastado ($)</label><input class="fi" type="number" id="me-modal-tot" placeholder="ej: 2000" inputmode="decimal" oninput="meModalCalcUnit()"></div>'
    +'<div class="fg"><label class="fl" id="me-modal-qty-lbl">Cantidad (u)</label><input class="fi" type="number" id="me-modal-qty" placeholder="ej: 50" inputmode="decimal" oninput="meModalCalcUnit()"></div>'
    +'</div>'
    +'<div style="padding:10px;background:var(--bg);border-radius:8px;text-align:center;margin-bottom:8px"><span style="font-size:12px;color:var(--t3)">Precio unitario calculado:</span> <b id="me-modal-unit-calc" style="font-size:15px;color:var(--br)">—</b></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:6px">'
    +'<button class="btn bs2" style="flex:1" onclick="closeMeModal()">Cancelar</button>'
    +'<button class="btn bp" style="flex:2" onclick="saveMeFromModal()">✓ Crear y agregar</button>'
    +'</div>'
    +'</div>';
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){var n=document.getElementById('me-modal-n');if(n)n.focus();},80);
}
function closeMeModal(){var o=document.getElementById('me-modal-overlay');if(o)o.remove();}
function meModalCatChg(val){
  var d=document.getElementById('me-modal-cat-new');
  if(d)d.style.display=val==='__new__'?'block':'none';
}
function meModalCatCancel(){
  var d=document.getElementById('me-modal-cat-new');if(d)d.style.display='none';
  var sel=document.getElementById('me-modal-c');if(sel&&sel.value==='__new__')sel.value='';
}
function meModalCatSave(){
  var n=(document.getElementById('me-modal-cat-n')&&document.getElementById('me-modal-cat-n').value||'').trim();
  if(!n){alert('Ingresá un nombre para la categoría');return;}
  var id=uid();
  (D.cme=D.cme||[]).push({id:id,n:n});
  saveD();
  var sel=document.getElementById('me-modal-c');
  if(sel){
    var opt=document.createElement('option');opt.value=id;opt.text=n;
    sel.insertBefore(opt,sel.lastChild);sel.value=id;
  }
  var d=document.getElementById('me-modal-cat-new');if(d)d.style.display='none';
}
function meModeUnit(){
  document.getElementById('me-modal-mode-unit').style.display='block';
  document.getElementById('me-modal-mode-total').style.display='none';
  document.getElementById('me-modal-m-unit').style.background='var(--br)';
  document.getElementById('me-modal-m-unit').style.color='#fff';
  document.getElementById('me-modal-m-total').style.background='var(--bd)';
  document.getElementById('me-modal-m-total').style.color='var(--t2)';
}
function meModeTotal(){
  document.getElementById('me-modal-mode-unit').style.display='none';
  document.getElementById('me-modal-mode-total').style.display='block';
  document.getElementById('me-modal-m-total').style.background='var(--br)';
  document.getElementById('me-modal-m-total').style.color='#fff';
  document.getElementById('me-modal-m-unit').style.background='var(--bd)';
  document.getElementById('me-modal-m-unit').style.color='var(--t2)';
}
function meModalUpdLabel(){meModalUpdAllLabels();}
function meModalUpdAllLabels(){
  var u=(document.getElementById('me-modal-u')&&document.getElementById('me-modal-u').value)||'u';
  var uLabels={u:'unidad',cm:'centímetro',m:'metro',kg:'kilogramo',g:'gramo'};
  var uLabel=uLabels[u]||u;
  var lbl=document.getElementById('me-modal-price-lbl');
  if(lbl)lbl.textContent='Precio por '+uLabel+' ($)';
  var qlbl=document.getElementById('me-modal-qty-lbl');
  if(qlbl)qlbl.textContent='Cantidad ('+uLabel+')';
}
function meModalCalcUnit(){
  var tot=parseFloat(document.getElementById('me-modal-tot')&&document.getElementById('me-modal-tot').value)||0;
  var qty=parseFloat(document.getElementById('me-modal-qty')&&document.getElementById('me-modal-qty').value)||0;
  var calc=document.getElementById('me-modal-unit-calc');
  if(calc)calc.textContent=(tot&&qty)?fmt(tot/qty):'—';
}
function saveMeFromModal(){
  var n=(document.getElementById('me-modal-n')&&document.getElementById('me-modal-n').value||'').trim();
  if(!n){alert('El nombre es obligatorio');document.getElementById('me-modal-n').focus();return;}
  var catSel=document.getElementById('me-modal-c');
  var catVal=catSel?catSel.value:'';
  if(catVal==='__new__'){alert('Completá la nueva categoría primero');return;}
  var uSel=document.getElementById('me-modal-u');
  var uVal=uSel?uSel.value:'u';
  var id=uid();
  var pvSelMe=document.getElementById('me-modal-pv');
  var pvValMe=pvSelMe&&pvSelMe.value!=='__new__'?pvSelMe.value:'';
  (D.me=D.me||[]).push({id:id,n:n,c:catVal,u:uVal,pv:pvValMe});
  var modeTotal=document.getElementById('me-modal-mode-total')&&document.getElementById('me-modal-mode-total').style.display!=='none';
  var prc=0;
  if(modeTotal){
    var tot=parseFloat(document.getElementById('me-modal-tot')&&document.getElementById('me-modal-tot').value)||0;
    var qty=parseFloat(document.getElementById('me-modal-qty')&&document.getElementById('me-modal-qty').value)||0;
    if(tot&&qty)prc=tot/qty;
  } else {
    prc=parseFloat(document.getElementById('me-modal-prc')&&document.getElementById('me-modal-prc').value)||0;
  }
  if(prc>0)(D.mep=D.mep||[]).push({id:uid(),m:id,v:prc,f:toStr(),pv:''});
  saveD();
  closeMeModal();
  // Shared callback: used by Nuevo Producto AND Editar Receta
  if(_meModalCb){var fn=_meModalCb;_meModalCb=null;fn(id);}
  else{
    // Legacy: Nuevo Producto flow
    NPT.recItems.push({t:'ME',i:id,q:1});
    NPT._srMe='';
    renderCreatePT();
  }
}

// ═══════════════════════════════════════════════════
//  SWIPE BACK – deslizar desde borde izquierdo
// ═══════════════════════════════════════════════════
(function(){
  var app=document.getElementById('app');
  var startX=0,startY=0,tracking=false;
  var EDGE=22,MIN_DIST=60,MAX_VERT=80;
  app.addEventListener('touchstart',function(e){
    var t=e.touches[0];
    startX=t.clientX;startY=t.clientY;
    tracking=startX<=EDGE;
  },{passive:true});
  app.addEventListener('touchend',function(e){
    if(!tracking)return;
    var t=e.changedTouches[0];
    var dx=t.clientX-startX,dy=Math.abs(t.clientY-startY);
    tracking=false;
    if(dx>=MIN_DIST&&dy<=MAX_VERT&&NAV_HIST.length){
      goBack();
    }
  },{passive:true});
  app.addEventListener('touchmove',function(e){
    if(!tracking)return;
    var t=e.touches[0];
    var dy=Math.abs(t.clientY-startY),dx=t.clientX-startX;
    if(dy>MAX_VERT||dx<0)tracking=false;
  },{passive:true});
})();

</script>
